name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  KOJA_VERSION: 0.15.1

jobs:
  prettier:
    name: Prettier
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Prettier check
        run: npx prettier@latest --check .

  test:
    name: Test (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: linux-x86_64
          - os: ubuntu-24.04-arm
            target: linux-arm64
    steps:
      - uses: actions/checkout@v6

      - name: Install koja
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          name="koja-v${KOJA_VERSION}-${{ matrix.target }}"
          gh release download "v${KOJA_VERSION}" --repo koja-lang/koja \
            --pattern "${name}.tar.gz" --pattern "${name}.tar.gz.sha256"
          sha256sum -c "${name}.tar.gz.sha256"
          tar -xzf "${name}.tar.gz"
          echo "$PWD/${name}" >> "$GITHUB_PATH"

      - name: Koja format check
        run: git ls-files '*.koja' | xargs koja format --check

      - name: Typecheck
        run: koja check

      - name: Start Postgres
        run: |
          docker compose up -d
          for _ in $(seq 30); do
            docker compose exec -T postgres pg_isready -U postgres && exit 0
            sleep 1
          done
          echo "Postgres never became ready" >&2
          docker compose logs postgres >&2
          exit 1

      - name: Run tests
        run: koja test
